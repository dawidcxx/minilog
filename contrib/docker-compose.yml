services:
  db:
    image: timescale/timescaledb:latest-pg17
    restart: always
    environment:
      - POSTGRES_DB=logs
      - POSTGRES_USER=logs
      - POSTGRES_PASSWORD=123
    ports:
      - "5432:5432"
    volumes:
      # Mount the initialization script
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data so it doesn't vanish when the container stops
      - db:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    ports:
      - "6662:8080"
    depends_on:
      - db

volumes:
  db: